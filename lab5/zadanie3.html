<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
   </head>
   <body>
		<script>
			function fibonacci(n){
				tabliczka = [];
				tabliczka.push(0);
				tabliczka.push(1);
				i=2;
				for (var i=0; i < n; i++){
					wyraz = tabliczka[i-2]+tabliczka[i-1];
					tabliczka.push(wyraz);
				}
				console.log(tabliczka);
			}
			
			fibonacci(8); //To jest wywołanie funkcji
		</script>
   </body>
</html>
