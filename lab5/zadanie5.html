<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
   </head>
   <body>
		<script>
			function ciag(n){
				sumka = 0;
				dzielnik = 1;
				for(var i = 1; i < n; i++){
					if ((i%2) == 0){
						sumka -= (1/dzielnik);
					}else{
						sumka += (1/dzielnik);
					}
					dzielnik += 2;
				}
				return sumka * 4;
			}
			
			console.log(ciag(680)); //To jest wywołanie funkcji
		</script>
   </body>
</html>
