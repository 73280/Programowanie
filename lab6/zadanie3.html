		<button id = "pobierz" onclick="czasPobierz()">POBIERZ</button>
		<script>
			function czasPobierz(){
				var zapytanie = new XMLHttpRequest()
				var url = "https://timeapi.io/api/v1/time/current/zone?timezone=Europe%2FWarsaw"
				zapytanie.open("GET", url , false )
				zapytanie.send(null)
				console.log(zapytanie.resposeText)
			}
		</script>
